<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- SEO indexing -->
    <meta name="robots" content="index, follow" />
    <meta
      name="googlebot"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://www.blackmattertech.com/" />
    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="https://www.blackmattertech.com/sitemap.xml"
    />

    <meta
      name="description"
      content="BlackMatter Technologies is a custom software development company in India. We build ERP systems, SaaS platforms, web applications, and business automation—with 50+ products shipped from discovery to production."
    />
    <meta
      name="keywords"
      content="custom software development company, software development company India, ERP software development, SaaS development company, custom web application development, business automation software, ecommerce development, mobile app development"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Custom Software Development Company | ERP, SaaS &amp; Web Apps | BlackMatter"
    />
    <meta
      property="og:description"
      content="BlackMatter Technologies is a custom software development company in India. We build ERP systems, SaaS platforms, web applications, and business automation—with 50+ products shipped from discovery to production."
    />
    <meta property="og:url" content="https://www.blackmattertech.com/" />
    <meta property="og:site_name" content="BlackMatter Technologies" />
    <meta
      property="og:image"
      content="https://www.blackmattertech.com/footer-hero.png"
    />
    <meta
      property="og:image:alt"
      content="Custom software development company — BlackMatter Technologies ERP and SaaS"
    />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Custom Software Development Company | ERP, SaaS &amp; Web Apps | BlackMatter"
    />
    <meta
      name="twitter:description"
      content="BlackMatter Technologies builds custom software for every industry. We transform chaos into systems—with 50+ tailored solutions shipped from idea to production."
    />
    <meta
      name="twitter:image"
      content="https://www.blackmattertech.com/footer-hero.png"
    />
    <meta
      name="twitter:image:alt"
      content="Custom software development company — BlackMatter Technologies ERP and SaaS"
    />

    <!-- LCP: preload hero before JS (mobile + desktop) -->
    <link
      rel="preload"
      as="image"
      href="/hero-mobile.jpg"
      media="(max-width: 767px)"
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="image"
      href="/footer-hero.png"
      media="(min-width: 768px)"
      fetchpriority="high"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical paint: avoid white flash before CSS bundle -->
    <style>
      html,
      body {
        margin: 0;
        background: #000;
        color: #fff;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
    </style>

    <!-- Fonts: non-render-blocking (saves ~1s on mobile Lighthouse) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Anton&family=Space+Grotesk:wght@400;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Anton&family=Space+Grotesk:wght@400;600&display=swap"
      />
    </noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Condiment&family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Condiment&family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400&display=swap"
      />
    </noscript>

    <title>Custom Software Development Company | ERP, SaaS &amp; Web Apps | BlackMatter</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
